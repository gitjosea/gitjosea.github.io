<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Platform Revival</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 600px;
            margin: 80px auto;
            padding: 0 20px;
            text-align: center;
            background-color: #fafafa;
            color: #333;
        }
        h1 {
            font-size: 2.2rem;
            color: #111;
            margin-bottom: 10px;
            font-weight: 700;
        }
        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }
        .card {
            background: #fff;
            border: 1px solid #e1e1e1;
            border-radius: 12px;
            padding: 24px;
            margin-top: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .app-link {
            display: inline-block;
            background-color: #0071e3;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            margin-top: 10px;

        }
        .app-link:hover {

        }
        footer {

            font-size: 0.85rem;
            color: #999;
